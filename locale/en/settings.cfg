[mod-setting-name]
trainController-manual-placing-trains=Allow manual placing of trains
trainController-tickRate=Trainbuilder update speed
trainController-allow-speed-modules=Allow speed modules in Trainbuilders

[mod-setting-description]
trainController-manual-placing-trains=If checked, you can manually place trains on tracks without the __ITEM__trainassembly__. Can be changed while playing.\nDefault: unchecked
trainController-tickRate=Sets the number of ticks between updates. Lower = faster updates = resource intensive.\nDefault: 5 ticks
trainController-allow-speed-modules=If enabled, Trainbuilders accept speed modules. This increases throughput but also energy usage and can increase UPS cost in very large builds.\nDefault: disabled
