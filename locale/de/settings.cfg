[mod-setting-name]
trainController-manual-placing-trains=Manuelles Platzieren von Zügen erlauben
trainController-tickRate=Aktualisierungsgeschwindigkeit des Zugbauers
trainController-allow-speed-modules=Geschwindigkeitsmodule in Zugbauern erlauben

[mod-setting-description]
trainController-manual-placing-trains=Wenn aktiviert, können Züge ohne __ITEM__trainassembly__ manuell auf Gleisen platziert werden. Kann während des Spiels geändert werden.\nStandard: deaktiviert
trainController-tickRate=Legt die Anzahl der Ticks zwischen Aktualisierungen fest. Niedriger = schnellere Aktualisierung = ressourcenintensiver.\nStandard: 5 Ticks
trainController-allow-speed-modules=Wenn aktiviert, akzeptieren Zugbauer Geschwindigkeitsmodule. Das erhöht den Durchsatz, aber auch den Energieverbrauch und kann in sehr großen Anlagen mehr UPS kosten.\nStandard: deaktiviert
