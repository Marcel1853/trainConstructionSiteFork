[tips-and-tricks-item-name]
TCS-train-building=Zugbau

[tips-and-tricks-item-description]
TCS-description=Ein Mod, der den Bau von Zügen automatisiert. Fork aktualisiert und auf Factorio 2.1 portiert von Marcel171297.\n\nFügt folgende Inhalte hinzu:\n    [img=entity/traindepot] __ITEM__traindepot__\n    [img=item/trainassembly] __ITEM__trainassembly__\n    [img=item/traincontroller] __ITEM__trainassembly__-Steuerung

TCS-introduction-1-h=Einführung in Train Construction Site
TCS-introduction-1-1=Der Mod [tooltip=Train Construction Site Fork Fork,tips-and-tricks-item-description.TCS-description] führt eine realistischere Art ein, Züge zu bauen. __1__ Wenn der Zug fertig ist, fährt er zu einem [entity=traindepot], von wo aus du ihn manuell weiter schicken kannst. Du kannst vom Kartenmodus aus auf Züge im Depot zugreifen, ohne in der Nähe sein zu müssen. Kopieren und Einfügen eines Fahrplans in einen dieser Züge lässt ihn sofort seine Aufgabe ausführen.
TCS-introduction-1-1-a=Die Züge werden in einem [entity=trainassembly-machine] erstellt. Manuelles Platzieren von Zügen kann in den Start-Einstellungen aktiviert oder deaktiviert werden.
TCS-introduction-1-1-b=Zusätzlich zum manuellen Platzieren von Zügen können sie automatisch in einem [entity=trainassembly-machine] gebaut werden.
TCS-introduction-1-2=Die Baustelle besteht aus drei Objekten:\n - [img=item/traindepot] dem __ITEM__traindepot__,\n - [img=item/trainassembly] dem __ITEM__trainassembly__,\n - [img=item/traincontroller] der __ITEM__trainassembly__-Steuerung.
TCS-introduction-1-3=Weitere Informationen zu diesen Objekten findest du in späteren Tipps und Tricks, sobald du sie freischaltest.
TCS-introduction-1-4=Wenn du Fehler findest oder Fragen hast, melde dich gerne im Diskussionsbereich des Mod-Portals oder erstelle einen Fehlerbericht auf GitHub.
TCS-introduction-1-5=Viele Grüße und viel Spaß beim Spielen!\n[img=entity/character][color=207,6,0][font=default-bold]Lovely_santa[/font][/color], [img=entity/character][color=70,192,181][font=default-bold]Voske_123[/font][/color] und [img=entity/character][color=120,180,255][font=default-bold]Marcel171297[/font][/color].\n\nFactorio-2.1-Update und Pflege von [font=default-bold]Marcel171297[/font].

traindepot-1-h=Nutzung
traindepot-1-1=[entity=traindepot] wird verwendet, um frisch gebaute Züge zu lagern. Natürlich kannst du auch andere, gerade nicht benötigte Züge zu diesen Bahnhöfen schicken. Wenn du mehr Züge brauchst, kannst du sie aus dem Depot nehmen und einsetzen. Das geht sogar aus der Kartenansicht, ohne in der Nähe des Depots zu sein!
traindepot-1-2=Der Train Construction Site Mod erlaubt es, Züge in einem Gebäude zu erstellen, statt sie manuell zu platzieren. Wenn der Zug gebaut ist, fährt er zum Depot-Halt, wo du ihn manuell weiterschicken kannst. Du kannst vom Kartenmodus aus auf Züge im Depot zugreifen, ohne in der Nähe sein zu müssen. Kopieren und Einfügen eines Fahrplans in einen dieser Züge lässt ihn sofort seine Aufgabe ausführen.
traindepot-2-h=Depot-Statistik
traindepot-2-1=Wenn du das [entity=traindepot] öffnest (__CONTROL__open-gui__), siehst du grundlegende Informationen über das Depot.
traindepot-2-2=[font=default-semibold]Depotname:[/font] Der Name dieses Depots. Über die Bearbeiten-Schaltfläche oder durch Wechseln des Tabs kannst du den Depotnamen beliebig ändern, ähnlich wie bei einem normalen Bahnhof. Natürlich kannst du auch Kopieren/Einfügen zum Umbenennen verwenden.
traindepot-2-3=[font=default-semibold]Verfügbare Depotplätze:[/font] Die Anzahl der verfügbaren Depotplätze. Sie wird als "verfügbar/gesamt" angezeigt. Weitere Bahnhöfe mit demselben Namen erhöhen die Gesamtzahl der Züge, die im Depot stehen können.
traindepot-3-h=Depot-Einstellungen
traindepot-3-1=[font=default-semibold]Angeforderte Anzahl:[/font] Im Depot-Menü kannst du einstellen, wie viele Züge im Depot vorhanden sein sollen. Wenn weniger Züge vorhanden sind als angefordert, erstellt der verbundene [entity=trainassembly-machine] weitere Züge, bis die Anforderung erfüllt ist.
traindepot-3-2=[font=default-semibold]Verbundene Zugbauer:[/font] Die [entity=traincontroller], die mit diesem Depot verbunden sind und Anforderungen erfüllen. Es wird außerdem eine Liste aller Steuerungen angezeigt, auf die du von hier aus zugreifen kannst.

trainassembly-1-h=Funktion
trainassembly-1-1=Der [entity=trainassembly-machine] setzt Zugteile zu funktionsfähigen Waggons und Lokomotiven zusammen. Du legst die Zutaten wie bei einer Montagemaschine in das Gebäude. Danach beginnt es mit der Produktion fertiger Züge. Ohne angeschlossene Zugbauer-Steuerung wird der Zug jedoch nicht auf das Gleis gesetzt.
trainassembly-2-h=Bauvoraussetzungen
trainassembly-2-1=[img=utility/warning_icon] Züge können nicht überall platziert werden, sondern müssen auf Schienen stehen. Daher muss auch das Gebäude auf geraden Schienen platziert werden. So baut das Gebäude die Züge direkt auf den Gleisen zusammen.
trainassembly-2-2=Lokomotiven und Waggons sind jeweils 6 Kacheln breit, mit einer Kachel Abstand dazwischen. Das Gebäude ist ebenfalls 6 Kacheln breit. Um einen vollständigen Zug zu bauen, musst du mehrere __ITEM__trainassembly__ miteinander verbinden, indem du die Gebäude mit einer Kachel Abstand zueinander platzierst.
trainassembly-2-3=[img=utility/electricity_icon_unplugged] Der Bau eines Zugs benötigt schwere Werkzeuge, daher müssen die Gebäude mit Strom versorgt werden. Sie verbrauchen viel Energie, unterstützen aber [img=item/efficiency-module-3] __ITEM__efficiency-module__e. Aus Sicherheitsgründen sind __ITEM__speed-module__ nicht erlaubt, und __ITEM__productivity-module__ ergeben hier keinen Sinn.
trainassembly-3-h=Rezeptanforderungen
trainassembly-3-1=[img=utility/no_building_material_icon] Jeder Zug benötigt Teile, um gebaut zu werden. Diese Teile können separat mit denselben Zutaten hergestellt werden, die du ohne diesen Mod für einen Zug verwenden würdest.
trainassembly-3-2=Der Zug muss wegfahren können, daher benötigen Lokomotiven Treibstoff. Damit keine Treibstoffart fest vorgeschrieben ist, gibt es das generische Treibstoff-Item [item=trainassembly-recipefuel], das aus den meisten anderen Treibstoffen hergestellt werden kann. Gemoddete Züge mit speziellem Treibstoff benötigen diesen Treibstoff direkt. Wenn Qualität aktiv ist, wird die Qualität des Zugteile-Items auf den erzeugten Zug übertragen.
trainassembly-3-3=[img=utility/not_enough_repair_packs_icon] Der __ITEM__trainassembly__ hat einen blauen Pfeil, der die Richtung des Gebäudes anzeigt. Das ist nützlich beim Bau von Zügen, bei denen die Ausrichtung wichtig ist, zum Beispiel bei __ENTITY__locomotive__ oder __ENTITY__artillery-wagon__.
trainassembly-3-4=Im obigen Beispiel erstellt der __ITEM__trainassembly__ einen Zug von links nach rechts mit:\n - [img=entity/locomotive] __ENTITY__locomotive__ nach Westen\n - [img=entity/cargo-wagon] __ENTITY__cargo-wagon__ nach Westen (Richtung egal)\n - [img=entity/cargo-wagon] __ENTITY__cargo-wagon__ nach Osten\n - [img=entity/locomotive] __ENTITY__locomotive__ nach Osten\nFür Spieler, die Zugkonfigurationen gerne als Zahlen ausdrücken, wäre das ein 1-2-1-Zug: 1 Lokomotive vorne, 2 Waggons, 1 Lokomotive hinten.

traincontroller-1-h=Platzierungsanforderungen
traincontroller-1-1=Die [entity=traincontroller] muss vor den __ITEM__trainassembly__ platziert werden, damit sie diese steuern kann. Sie wird wie ein __ENTITY__train-stop__ platziert:\n - auf der rechten Seite des Gleises\n - in der Richtung, aus der der Zug heranfährt (gelbe Pfeile).
traincontroller-1-2=Da der Zug automatisch ausfährt, muss mindestens eine Lokomotive in diese Richtung zeigen, damit der Zug wegfahren kann. Damit der Zug ein Ziel hat, muss mindestens ein __ITEM__traindepot__ auf der Karte platziert sein, bevor du eine Steuerung platzieren kannst.
traincontroller-2-h=Steuerungs-Statistik
traincontroller-2-1=Wenn du die Steuerung öffnest (__CONTROL__open-gui__), siehst du grundlegende Informationen über den Zugbauer.
traincontroller-2-2=[font=default-semibold]Verbundenes Depot:[/font] Der Name des Depots, für das diese Steuerung arbeitet. Über die Bearbeiten-Schaltfläche oder durch Wechseln des Tabs kannst du den Namen auf ein vorhandenes Depot ändern, ähnlich wie bei einem normalen Bahnhof. Kopieren/Einfügen kann ebenfalls zum Umbenennen verwendet werden.
traincontroller-2-3=[font=default-semibold]Depot-Anforderungsstatus:[/font] Die Anzahl der Züge, die das Depot anfordert. Dies wird als "aktuell/angefordert" im Depot angezeigt. Ist der aktuelle Wert niedriger als der angeforderte, schickt die Steuerung einen Zug zum Depot. Die angeforderte Anzahl änderst du im Depot.
traincontroller-2-4=[font=default-semibold]Bauer-Status:[/font] Der aktuelle Status dieses Depots. Mögliche Werte sind:\n - Zug wird gebaut\n - Wartet auf Anforderung\n - Zug wird entsendet\nDie Steuerung beginnt mit dem Platzieren der Wagen auf dem Gleis, sobald ein Teil fertig gebaut ist. Sobald der Zug zum Depot fährt, beginnt der Bauer sofort mit dem nächsten Zug.
traincontroller-3-h=Zugbauer-Oberfläche
traincontroller-3-1=Die Zugbauer-Steuerung bietet außerdem einige Funktionen zur Konfiguration des Zugbauers, wie in der Oberfläche gezeigt.
traincontroller-3-2=Anstatt umherzugehen und deine __ITEM__trainassembly__ manuell zu drehen, kannst du dies direkt in der Oberfläche tun. Drücke dazu die Schaltflächen [img=traincontroller-orientation-L]/[img=traincontroller-orientation-R], um die Ausrichtung zu ändern. Für __ENTITY__locomotive__ kannst du außerdem über die Schaltfläche [img=utility/color_picker] die Farbe im Farbwähler einstellen.
